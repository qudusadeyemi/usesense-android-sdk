# GPG key generation batch config for the Maven Central signing key.
#
# Usage:
#
#   gpg --batch --generate-key scripts/maven-central-gpg-batch.conf
#
# Generates an RSA 4096 primary key + RSA 4096 signing subkey, no
# expiry, owned by the UseSense SDK maintainer email. The passphrase
# is read from GPG_PASSPHRASE; export it before running:
#
#   export GPG_PASSPHRASE="$(openssl rand -base64 32)"
#   gpg --batch --generate-key scripts/maven-central-gpg-batch.conf
#   echo "GPG_PASSPHRASE for SIGNING_PASSWORD secret: $GPG_PASSPHRASE"
#
# After the key is generated, export and upload:
#
#   KEY_ID=$(gpg --list-secret-keys --keyid-format=long support@usesense.ai \
#     | awk '/^sec/ { split($2, a, "/"); print a[2]; exit }')
#   gpg --armor --export-secret-keys "$KEY_ID" > signing-key.asc
#   gpg --keyserver keyserver.ubuntu.com --send-keys "$KEY_ID"
#
# Paste signing-key.asc into the SIGNING_KEY repo secret and
# $GPG_PASSPHRASE into the SIGNING_PASSWORD repo secret.
#
# DO NOT commit signing-key.asc to the repo. Ever.

%echo Generating UseSense SDK Maven Central signing key...
Key-Type: RSA
Key-Length: 4096
Subkey-Type: RSA
Subkey-Length: 4096
Name-Real: UseSense SDK
Name-Email: support@usesense.ai
Name-Comment: Maven Central signing key
Expire-Date: 0
Passphrase: $GPG_PASSPHRASE
%commit
%echo UseSense SDK signing key generated.
