# Release workflow - publishes the SDK to GitHub Packages and creates a GitHub Release
#
# Triggers:
#   - Git tags matching v* pattern (e.g., v1.0.0, v1.2.3-beta01)
#   - Manual dispatch via workflow_dispatch (specify version without 'v' prefix)
#
# Required secrets:
#   GITHUB_TOKEN - Auto-provided by GitHub Actions
#
# Optional secrets (for Maven Central publishing):
#   ORG_GRADLE_PROJECT_signingKey        - GPG private key (ASCII armored)
#   ORG_GRADLE_PROJECT_signingPassword   - GPG key passphrase
#   ORG_GRADLE_PROJECT_sonatypeUsername  - Sonatype OSSRH username
#   ORG_GRADLE_PROJECT_sonatypePassword  - Sonatype OSSRH password

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (without v prefix, e.g. 1.0.0)'
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          validate-wrappers: false

      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set SDK version
        run: sed -i "s/sdkVersion=.*/sdkVersion=${{ steps.version.outputs.version }}/" gradle.properties

      - name: Build SDK
        run: ./gradlew :sdk:assembleRelease

      - name: Run tests
        run: ./gradlew :sdk:test

      - name: Run lint
        run: ./gradlew :sdk:lintRelease

      - name: Publish to Maven Central (Sonatype OSSRH)
        if: ${{ secrets.ORG_GRADLE_PROJECT_sonatypeUsername != '' }}
        continue-on-error: true
        run: ./gradlew :sdk:publishReleasePublicationToSonatypeRepository
        env:
          ORG_GRADLE_PROJECT_signingKey: ${{ secrets.ORG_GRADLE_PROJECT_signingKey }}
          ORG_GRADLE_PROJECT_signingPassword: ${{ secrets.ORG_GRADLE_PROJECT_signingPassword }}
          ORG_GRADLE_PROJECT_sonatypeUsername: ${{ secrets.ORG_GRADLE_PROJECT_sonatypeUsername }}
          ORG_GRADLE_PROJECT_sonatypePassword: ${{ secrets.ORG_GRADLE_PROJECT_sonatypePassword }}

      - name: Publish to GitHub Packages
        run: ./gradlew :sdk:publishReleasePublicationToGitHubPackagesRepository
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Find AAR artifact
        id: find_aar
        run: |
          AAR_PATH=$(find sdk/build/outputs/aar -name "*.aar" -type f | head -1)
          echo "aar_path=$AAR_PATH" >> "$GITHUB_OUTPUT"
          echo "aar_name=usesense-sdk-${{ steps.version.outputs.version }}.aar" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: ${{ steps.find_aar.outputs.aar_path }}
          body: |
            ## Installation

            ### GitHub Packages
            ```kotlin
            // In settings.gradle.kts, add the repository:
            dependencyResolutionManagement {
                repositories {
                    maven {
                        url = uri("https://maven.pkg.github.com/qudusadeyemi/usesense-android-sdk")
                        credentials {
                            username = providers.gradleProperty("gpr.user").getOrElse(System.getenv("GITHUB_ACTOR"))
                            password = providers.gradleProperty("gpr.token").getOrElse(System.getenv("GITHUB_TOKEN"))
                        }
                    }
                }
            }

            // In app/build.gradle.kts:
            dependencies {
                implementation("ai.usesense:sdk:${{ steps.version.outputs.version }}")
            }
            ```

            ### Manual Installation
            Download the AAR from the assets below and follow the [manual installation instructions](https://github.com/qudusadeyemi/usesense-android-sdk#manual-installation) in the README.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
