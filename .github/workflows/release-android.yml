# Release workflow - publishes the SDK to GitHub Packages, Maven Central,
# and creates a GitHub Release with the AAR + Dokka zip attached.
#
# Triggers:
#   - Git tags matching v* pattern (e.g., v1.0.0, v1.2.3-beta01)
#   - Manual dispatch via workflow_dispatch (specify version without 'v' prefix)
#
# Required secrets:
#   GITHUB_TOKEN       - Auto-provided by GitHub Actions. Used for the
#                        GitHub Packages push and the Release creation.
#   SONATYPE_USERNAME  - Sonatype Central Portal user token username.
#   SONATYPE_PASSWORD  - Sonatype Central Portal user token password.
#   SIGNING_KEY        - ASCII-armored GPG secret key (full multiline
#                        `-----BEGIN PGP PRIVATE KEY BLOCK-----` block).
#   SIGNING_PASSWORD   - GPG passphrase for the signing key.
#
# The Maven Central step is conditionally skipped when SONATYPE_USERNAME
# is unset (detected via the "Check Sonatype credentials" step below),
# so this workflow can still publish to GitHub Packages successfully
# before the Sonatype account and GPG key are configured.

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (without v prefix, e.g. 1.0.0)'
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          validate-wrappers: false

      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set SDK version
        run: sed -i "s/sdkVersion=.*/sdkVersion=${{ steps.version.outputs.version }}/" gradle.properties

      - name: Build SDK
        run: ./gradlew :sdk:assembleRelease

      - name: Build sources JAR
        # `releaseSourcesJar` is the AGP-generated task activated by
        # `publishing { singleVariant("release") { withSourcesJar() } }`
        # in sdk/build.gradle.kts. The publish step below will rebuild
        # it transitively, but running it explicitly here makes
        # failures easier to diagnose (sources generation vs publish
        # auth) and surfaces a clean timing breakdown in the CI log.
        run: ./gradlew :sdk:releaseSourcesJar

      - name: Generate Dokka HTML
        # dokkaHtml is configured in sdk/build.gradle.kts. If the task
        # fails (e.g., Dokka incompatible with the current Kotlin), we
        # don't want to block the release -- log and continue.
        continue-on-error: true
        run: ./gradlew :sdk:dokkaHtml

      - name: Run tests
        run: ./gradlew :sdk:test

      - name: Run lint
        run: ./gradlew :sdk:lintRelease

      - name: Check if version already published
        id: check_published
        # Hit the GitHub Packages Maven POM endpoint for this version.
        # If it returns 200 the version is already published -- skip the
        # publish step instead of hard-failing on a duplicate push.
        # Matches the idempotent-retry pattern we landed on iOS.
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          POM_URL="https://maven.pkg.github.com/qudusadeyemi/usesense-android-sdk/ai/usesense/sdk/${VERSION}/sdk-${VERSION}.pom"
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "$POM_URL")
          if [ "$HTTP" = "200" ]; then
            echo "ai.usesense:sdk:${VERSION} is already on GitHub Packages; skipping republish."
            echo "already_published=true" >> "$GITHUB_OUTPUT"
          else
            echo "ai.usesense:sdk:${VERSION} not yet published (HTTP $HTTP); proceeding."
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to GitHub Packages
        if: steps.check_published.outputs.already_published != 'true'
        # The publication name is `maven` (not `release`) because
        # vanniktech's AndroidSingleVariantLibrary creates it under that
        # conventional name. The coordinate published is still
        # ai.usesense:sdk:<version>.
        run: ./gradlew :sdk:publishMavenPublicationToGitHubPackagesRepository
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check Sonatype credentials
        id: sonatype
        # Detect whether Maven Central publishing is configured without
        # putting any secret values in the job output. The env-then-shell
        # pattern avoids interpolating secrets into the `if:` expression
        # directly (GitHub Actions explicitly warns against that for
        # leak-through reasons), and skips the publish cleanly when the
        # secret is absent rather than hard-failing.
        env:
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
        run: |
          if [ -n "$SONATYPE_USERNAME" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "Sonatype credentials present; Maven Central publish will run."
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Sonatype credentials not set; Maven Central publish will be skipped."
            echo "See CONTRIBUTING.md 'Future: Maven Central publishing' for setup steps."
          fi

      - name: Publish to Maven Central
        if: steps.sonatype.outputs.enabled == 'true' && steps.check_published.outputs.already_published != 'true'
        # `publishAndReleaseToMavenCentral` uploads to the Sonatype Central
        # Portal staging repo and auto-releases on successful validation.
        # --no-configuration-cache is per vanniktech's recommendation;
        # the in-memory signing plugin doesn't play nicely with the
        # configuration cache yet.
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.SONATYPE_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.SONATYPE_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
        run: ./gradlew :sdk:publishAndReleaseToMavenCentral --no-configuration-cache

      - name: Rename AAR for release attachment
        id: find_aar
        # Gradle's default AAR output is `sdk-release.aar`. We rename it
        # to `usesense-sdk-<version>.aar` at pack time so the file
        # attached to the GitHub Release page matches the filename used
        # in the README's manual-install snippet.
        run: |
          RAW_PATH=$(find sdk/build/outputs/aar -name "*.aar" -type f | head -1)
          RENAMED_PATH="sdk/build/outputs/aar/usesense-sdk-${{ steps.version.outputs.version }}.aar"
          if [ "$RAW_PATH" != "$RENAMED_PATH" ]; then
            mv "$RAW_PATH" "$RENAMED_PATH"
          fi
          echo "aar_path=$RENAMED_PATH" >> "$GITHUB_OUTPUT"

      - name: Package Dokka HTML for release
        id: package_dokka
        # Best-effort: if dokkaHtml succeeded, zip the output and include
        # it as a release asset. If dokka failed above, the directory
        # won't exist and we emit an empty path (the gh-release step
        # below handles an empty files entry gracefully).
        continue-on-error: true
        run: |
          DOKKA_DIR="sdk/build/dokka/html"
          if [ -d "$DOKKA_DIR" ]; then
            ZIP_PATH="sdk/build/usesense-sdk-${{ steps.version.outputs.version }}-dokka.zip"
            (cd "$DOKKA_DIR" && zip -rq "$GITHUB_WORKSPACE/$ZIP_PATH" .)
            echo "dokka_zip=$ZIP_PATH" >> "$GITHUB_OUTPUT"
          else
            echo "dokka_zip=" >> "$GITHUB_OUTPUT"
            echo "Dokka HTML directory not found; skipping Dokka zip."
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            ${{ steps.find_aar.outputs.aar_path }}
            ${{ steps.package_dokka.outputs.dokka_zip }}
          body: |
            ## Installation

            ### Maven Central (recommended)
            ```kotlin
            dependencies {
                implementation("ai.usesense:sdk:${{ steps.version.outputs.version }}")
            }
            ```
            Zero-auth. The `mavenCentral()` repo is already in every Android project by default.

            ### JitPack (alternative)
            ```kotlin
            // settings.gradle.kts
            dependencyResolutionManagement {
                repositories {
                    maven { url = uri("https://jitpack.io") }
                }
            }

            // app/build.gradle.kts
            dependencies {
                implementation("com.github.qudusadeyemi:usesense-android-sdk:v${{ steps.version.outputs.version }}")
            }
            ```

            ### GitHub Packages (requires auth)
            Requires a GitHub personal access token with `read:packages` scope. See the [README](https://github.com/qudusadeyemi/usesense-android-sdk#installation) for the full configuration.

            ### Manual Installation
            Download the AAR from the assets below and follow the [manual installation instructions](https://github.com/qudusadeyemi/usesense-android-sdk#manual-installation) in the README.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
